services:
  mysql:
    image: mysql:8.0
    container_name: chess-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: chessdb
      MYSQL_USER: chess
      MYSQL_PASSWORD: chess
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - chess_mysql_data:/var/lib/mysql

volumes:
  chess_mysql_data: